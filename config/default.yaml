# CoPaw Code 默认配置

app:
  name: "CoPaw Code"
  version: "0.1.0"
  debug: false
  log_level: "INFO"

llm:
  default_provider: "anthropic"
  default_model: "claude-opus-4-5"
  max_tokens: 8192
  temperature: 1.0
  request_timeout: 120

database:
  url: "sqlite+aiosqlite:///./copaw.db"

cache:
  enabled: false
  redis_url: "redis://localhost:6379/0"

security:
  default_sandbox_level: 1   # TIMEOUT
  command_timeout: 30
  max_file_size_mb: 10
  require_approval_for_write: false

memory:
  session_max_tokens: 8000
  long_term_enabled: true
  claude_md_filename: "CLAUDE.md"

api:
  host: "0.0.0.0"
  port: 8000
  prefix: "/v1"

token_budget:
  context_window_limit: 200000
  prompt_budget_ratio: 0.4
  memory_budget_ratio: 0.2
  response_budget_ratio: 0.4
