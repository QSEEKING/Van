version: '3.8'

services:
  copaw-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - COPAW_DEBUG=${COPAW_DEBUG:-false}
      - COPAW_LOG_LEVEL=${COPAW_LOG_LEVEL:-INFO}
    volumes:
      - ./config:/app/config
      - copaw-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  copaw-cli:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./config:/app/config
      - ./workspace:/workspace
    command: ["copaw", "cli"]
    stdin_open: true
    tty: true

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=copaw
      - POSTGRES_PASSWORD=copaw_secret
      - POSTGRES_DB=copaw
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U copaw"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  copaw-data:
  redis-data:
  postgres-data:

networks:
  default:
    name: copaw-network