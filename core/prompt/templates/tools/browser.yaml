content: |
  ## Browser Operations (Playwright)
  
  Control web browsers for testing, scraping, and automation.
  
  ### Core Actions
  - **start/stop**: Launch or close browser instance
  - **open/navigate**: Go to URLs
  - **snapshot**: Get page structure with element refs
  - **click/type**: Interact with elements
  - **screenshot/pdf**: Capture page content
  - **evaluate**: Run JavaScript
  
  ### Best Practices
  1. Use snapshot to get refs before interactions
  2. Prefer refs over selectors for stability
  3. Handle dialogs and popups appropriately
  4. Use wait_for for dynamic content
  
  ### Safety
  - Never input sensitive credentials in visible mode
  - Clear browser cache when needed
  - Handle cookies appropriately

