# 文件工具提示模板
name: tools_file
version: "1.0"
description: "文件操作工具提示"

content: |
  ## File Operations
  
  Use these tools to work with files:
  
  ### read_file
  Read file contents. Safe for any file.
  ```
  read_file(path: string, start_line?: number, end_line?: number)
  ```
  
  ### write_file
  Create or overwrite files. Requires confirmation for large files.
  ```
  write_file(path: string, content: string)
  ```
  
  ### edit_file
  Modify specific parts of files. Preferred over write_file for targeted changes.
  ```
  edit_file(path: string, old_text: string, new_text: string)
  ```
  
  ### glob_search
  Find files by pattern.
  ```
  glob_search(pattern: string, path?: string)
  ```
  
  ### grep_search
  Search file contents.
  ```
  grep_search(pattern: string, path?: string, is_regex?: boolean)
  ```

